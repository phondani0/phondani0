name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ----------------------------------------------------
          # TOKENS
          # ----------------------------------------------------
          token: ${{ secrets.METRICS_TOKEN }}
          
          # ----------------------------------------------------
          # CORE SETUP (This creates the two-column wide layout)
          # ----------------------------------------------------
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # THIS IS THE MAGIC WORD FOR THE TWO-COLUMN WIDE LAYOUT
          config_display: large 
          
          # ----------------------------------------------------
          # LEFT / MIDDLE COLUMN PLUGINS
          # ----------------------------------------------------
          # Coding habits and recent activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Mastered technologies and topics (Icons)
          plugin_topics: yes
          plugin_topics_mode: icons
          
          # ----------------------------------------------------
          # RIGHT COLUMN PLUGINS
          # ----------------------------------------------------
          # PageSpeed Insights
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://ankitphondani.com
          
          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Keeps it small like the image
          
          # Suggested tracks (Music)
          plugin_music: yes
          plugin_music_provider: apple 
          plugin_music_mode: playlist
          plugin_music_playlist: https://music.apple.com/us/playlist/ed-sheeran-essentials/pl.3b75f58905aa4486b08432f0e98846e8
          
          # Most used languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook 
          plugin_languages_details: percentage
          plugin_languages_indepth: yes 
          
          # Projects
          plugin_projects: yes
          plugin_projects_limit: 1
